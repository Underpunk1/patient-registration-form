<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Form</title>
</head>

<body>

    <h1>Patient Registration Form</h1>

    <p>
        Please fill in all required fields accurately before submitting the form.
    </p>

    <form>

        <!-- Full Name -->
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <!-- Email -->
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Phone -->
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <!-- Services Required -->
        <label>Services Required:</label><br>

        <input type="checkbox" id="consultation" name="service" value="Consultation">
        <label for="consultation">Consultation</label><br>

        <input type="checkbox" id="laboratory" name="service" value="Laboratory Test">
        <label for="laboratory">Laboratory Test</label><br>

        <input type="checkbox" id="pharmacy" name="service" value="Pharmacy">
        <label for="pharmacy">Pharmacy</label><br><br>

        <!-- County -->
        <label for="county">County of Residence:</label><br>
        <select id="county" name="county">
            <option value="">--Select County--</option>
            <option value="Nairobi">Nairobi</option>
            <option value="Kiambu">Kiambu</option>
            <option value="Mombasa">Mombasa</option>
            <option value="Nakuru">Nakuru</option>
        </select><br><br>

        <!-- Comments -->
        <label for="comments">Additional Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="40"></textarea><br><br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

    <footer>
    <p>&copy; 2026 Developed by James Jimba</p>
    <p>Zetech University - Diploma in Computer Science</p>
</footer>

</body>

</html>
